<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PureFlow Pressure Washing</title>
  <script>
    var segment = 1;
    var repo = 'Pressure-Washing';
    var to = window.location.pathname;
    if (to.indexOf('/' + repo + '/') !== 0) {
      segment = 0;
    }
    // Redirect to index.html so React Router can handle the route
    var parts = to.split('/');
    parts[segment] = 'index.html';
    window.location.replace(parts.join('/'));
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
